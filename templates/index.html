<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Brain Tumor Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="container">

        <h1>🧠 Brain Tumor Detection</h1>

        <p>
            Upload an MRI image and predict the tumor type.
        </p>

        <br>

        <form action="/" method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="image"
                accept="image/*"
                required
            >

            <br>

            <button type="submit">
                Analyze MRI Scan
            </button>

        </form>

    </div>

</body>

</html>
